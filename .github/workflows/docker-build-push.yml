name: Build, Scan, and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/industrial-iot-analytics-dashboard
      IMAGE_TAG: ${{ github.sha }}
      LATEST_TAG: ${{ env.IMAGE_NAME }}:latest
      SHA_TAG: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          tags: |
            ${{ env.SHA_TAG }}
            ${{ env.LATEST_TAG }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.37.0
        with:
          image-ref: ${{ env.SHA_TAG }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push Docker image to GitHub Container Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.SHA_TAG }}
            ${{ env.LATEST_TAG }}
